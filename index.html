<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการพื้นที่ป่าอนุรักษ์ - Interactive Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #375a33;
            --highlight-yellow: #68950d;
            --edit-orange: #ffa500;
            --save-blue: #2196F3;
            --active-magenta: #42725a;
        }

        body { font-family: 'Sarabun', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #e9ecef; }
        header { background: var(--forest-green); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .header-controls { display: flex; align-items: center; gap: 15px; }
        .area-select { padding: 8px 15px; border-radius: 5px; border: 2px solid var(--highlight-yellow); font-family: 'Sarabun'; cursor: pointer; font-weight: bold; background: white; color: var(--forest-green); }
        .search-main { background: white; border-radius: 4px; display: flex; width: 320px; padding: 5px 10px; border: 1px solid #ccc; }
        .search-main input { border: none; outline: none; width: 100%; font-family: 'Sarabun'; }
        
        .alphabet-nav { background: #acb5ad; padding: 10px; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        .letter { background: #e4e9e7; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .letter:hover { background: var(--forest-green); color: white; }

        .main-layout { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        #map { flex: 2; border-radius: 12px; border: 2px solid white; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1); z-index: 1; }
        .sidebar { flex: 1; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); overflow-y: auto; display: flex; flex-direction: column; }
        
        .info-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .info-table td { padding: 8px 8px; border-bottom: 1px solid #eee; font-size: 14px; vertical-align: middle; }
        .info-table td:first-child { font-weight: bold; color: #666; width: 115px; }
        
        .btn-action { margin-top: 10px; width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-family: 'Sarabun'; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-back { background: var(--forest-green); }
        .btn-save { background: var(--save-blue); margin-top: 15px; }
        
        .edit-input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Sarabun'; box-sizing: border-box; }
        .edit-input:focus { border-color: var(--edit-orange); outline: none; }
        
        label { cursor: pointer; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; font-size: 14px; }
        .name-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 6px; margin-bottom: 5px; transition: 0.2s; border-left: 4px solid transparent; }
        .name-item:hover { background: #f0fdf4; border-left: 4px solid var(--active-magenta); }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; font-size: 1.2em; white-space: nowrap;">🌿 ระบบพื้นที่ป่าอนุรักษ์</div>
        <div class="header-controls">
            <select class="area-select" id="areaPicker" onchange="changeArea(this.value)">
                <option value="all">แสดงพื้นที่ทั้งหมด </option>
                <option value="geojson/pmpn.geojson">1. เขตป่ารักษาพันธุ์สัตว์ป่าภูเมี่ยงและภูทอง</option>
                <option value="geojson/pd.geojson">2. เขตห้ามล่าสัตว์ป่าเขาน้อย-เขาประดู่</option>
                <option value="geojson/ty.geojson">3. เขตรักษาพันธุ์สัตว์ป่าตะเบาะ-ห้วยใหญ่ </option>
                <option value="geojson/ctg.geojson">4. อุทยานแห่งชาติน้ำตกชาติตระการ </option>
                <option value="geojson/TS.geojson">5. อุทยานแห่งชาติทุ่งแสลงหลวง </option>
                <option value="geojson/plg.geojson">6. อุทยานแห่งชาติภูหินร่องกล้า </option>
                <option value="geojson/tp.geojson">7. เขตห้ามล่าสัตว์ป่าถ้ำผาท่าพล </option>
                <option value="geojson/kkk.geojson">8. เขตห้ามล่าสัตว์ป่าเขาค้อ </option>
                <option value="geojson/lnn.geojson">9. อุทยานแห่งชาติลำน้ำน่าน </option>
                <option value="geojson/lnnl.geojson">10. เขตรักษาพันธุ์สัตว์ป่าลำน้ำน่านฝั่งขวา </option>
                <option value="geojson/mjl.geojson">11. เขตป่ารักษาพันธุ์สัตว์แม่จริม </option>
                <option value="geojson/np.geojson">12. เขตรักษาพันธุ์สัตว์ป่าน้ำปาด </option>
                <option value="geojson/okk.geojson">13. อุทยานแห่งชาติเขาค้อ </option>
                <option value="geojson/pk.geojson">14. เขตป่ารักษาพันธุ์สัตว์ภูขัด</option>
                <option value="geojson/psd.geojson">15. อุทยานแห่งชาติภูสอยดาว </option>
                <option value="geojson/psk.geojson">16. เขตห้ามล่าสัตว์ป่าภูสันเขียว</option>
                <option value="geojson/tsy.geojson">17. อุทยานแห่งชาติต้นสักใหญ่ </option>
                <option value="geojson/wp.geojson">18. เขตห้ามล่าสัตว์ป่าวังโป่ง-ชนแดน </option>
                <option value="geojson/namn.geojson">19. อุทยานแห่งชาติน้ำหนาว </option>
                <option value="geojson/puprd.geojson">20. เขตรักษาพันธุ์สัตว์ป่าภูผาแดง </option>
                <option value="geojson/sn.geojson">21. อุทยานแห่งชาติศรีน่าน </option>
                <option value="geojson/phal.geojson">22. เขตรักษาพันธุ์สัตว์ป่าภูหลวง </option>
                <option value="geojson/ply.geojson">23. เขตห้ามล่าสัตว์ป่าห้วยผึ้ง-วังยาว </option>
                <option value="geojson/tm.geojson">24. อุทยานแห่งชาติตาดหมอก </option>
            </select>
            <div class="search-main">
                <input type="text" id="searchInput" placeholder="ค้น ชื่อคน, หมู่บ้าน, หรือชื่อป่า..." onkeyup="if(event.key==='Enter') executeSearch()">
                <button onclick="executeSearch()" style="border:none; background:none; cursor:pointer;">🔍</button>
            </div>
        </div>
    </header>

    <nav class="alphabet-nav" id="alphabetNav"></nav>

    <div class="main-layout">
        <div id="map"></div>
        <aside class="sidebar" id="sidebar">
            <div id="sidebar-default" style="text-align:center; padding-top:50px;">
                <div style="font-size: 60px; opacity: 0.2;">📂</div>
                <h3>ยังไม่ได้เลือกแปลงที่ดิน</h3>
                <p>คลิกที่แปลงบนแผนที่ หรือค้นหาข้อมูลด้านบน</p>
            </div>
            <div id="sidebar-detail" style="display:none; width:100%;"></div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([17.45, 100.77], 10);
        let geoLayer;
        let boundaryLayer; 
        window.currentSelectedLayer = null;

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Esri World Imagery'
        }).addTo(map);

        const letters = ['ก','ข','ค','ง','จ','ฉ','ช','ซ','ญ','ด','ต','ถ','ท','ธ','น','บ','ป','ผ','ฝ','พ','ฟ','ภ','ม','ย','ร','ล','ว','ส','ห','อ'];
        const nav = document.getElementById('alphabetNav');
        letters.forEach(l => {
            const div = document.createElement('div');
            div.className = 'letter';
            div.innerText = l;
            div.onclick = () => { document.getElementById('searchInput').value = l; executeSearch(); };
            nav.appendChild(div);
        });

        function getVal(obj, key) {
            if (!obj) return '';
            const foundKey = Object.keys(obj).find(k => k.toLowerCase() === key.toLowerCase());
            return foundKey ? obj[foundKey] : '';
        }

        async function loadBoundary() {
            try {
                const bResponse = await fetch('mpt.geojson');
                if (bResponse.ok) {
                    const bData = await bResponse.json();
                    if (boundaryLayer) map.removeLayer(boundaryLayer);
                    boundaryLayer = L.geoJSON(bData, {
                        style: { color: "#DCDCDC", weight: 2, fillOpacity: 0, interactive: false }
                    }).addTo(map);
                    boundaryLayer.bringToFront();
                }
            } catch (e) { console.log("Boundary file not found."); }
        }

        async function changeArea(value) {
            if (!value) return;
            if (geoLayer) map.removeLayer(geoLayer);
            
            const allFiles = [
                'geojson/pmpn.geojson', 'geojson/pd.geojson', 'geojson/ty.geojson', 
                'geojson/ctg.geojson', 'geojson/TS.geojson', 'geojson/plg.geojson',
                'geojson/tp.geojson', 'geojson/kkk.geojson', 'geojson/lnn.geojson',
                'geojson/lnnl.geojson', 'geojson/mjl.geojson', 'geojson/np.geojson',
                'geojson/okk.geojson', 'geojson/pk.geojson', 'geojson/psd.geojson',
                'geojson/psk.geojson', 'geojson/tsy.geojson', 'geojson/wp.geojson',
                'geojson/namn.geojson', 'geojson/puprd.geojson', 'geojson/sn.geojson',
                'geojson/phal.geojson', 'geojson/ply.geojson', 'geojson/tm.geojson'
            ];

            const urls = (value === 'all') ? allFiles : [value];
            
            Promise.all(urls.map(url => fetch(url).then(res => res.json()).catch(() => ({features: []}))))
                .then(dataArray => {
                    const combined = { type: "FeatureCollection", features: dataArray.flatMap(d => d.features) };
                    renderGeoJSON(combined);
                    loadBoundary(); 
                });
        }

        function renderGeoJSON(data) {
            geoLayer = L.geoJSON(data, {
                style: { "color": "#ffff00", "weight": 2, "fillColor": "#327229", "fillOpacity": 0.4 },
                onEachFeature: (f, l) => {
                    const key = getVal(f.properties, 'spar_code') || getVal(f.properties, 'id');
                    const saved = localStorage.getItem('map_data_' + key);
                    if(saved) f.properties = JSON.parse(saved);
                    l.on('click', () => showDetail(f, l));
                }
            }).addTo(map);
            if (geoLayer.getLayers().length > 0) map.fitBounds(geoLayer.getBounds());
            resetSidebar();
        }

        function showDetail(feature, layer) {
            if (window.currentSelectedLayer) geoLayer.resetStyle(window.currentSelectedLayer);
            window.currentSelectedLayer = layer;
            layer.setStyle({ color: '#ff00ff', weight: 6, fillColor: '#ff00ff', fillOpacity: 0.5 });
            layer.bringToFront();
            if (boundaryLayer) boundaryLayer.bringToFront(); 

            map.flyToBounds(layer.getBounds(), { padding: [50, 50], duration: 1.2 });
            const p = feature.properties;
            document.getElementById('sidebar-default').style.display = 'none';
            document.getElementById('sidebar-detail').style.display = 'block';
            renderDetailTable(p, layer.getBounds().getCenter());
            
            layer.bindPopup(`<b>${getVal(p, 'name_title')}${getVal(p, 'name')} ${getVal(p, 'surname')}</b>`).openPopup();
        }

        function renderDetailTable(p, center) {
            const detail = document.getElementById('sidebar-detail');
            const area = getVal(p, 'area_rai') || getVal(p, 'rai') || 0;
            const village = p.par_village || getVal(p, 'PAR_BAN') || '';
            let forestValue = p.forest_name || [getVal(p, 'NAME_DNP_T'), getVal(p, 'NAME_DNP')].filter(Boolean).join(' ');

            detail.innerHTML = `
                <div style="text-align:left;">
                    <h2 style="color:var(--forest-green); margin-bottom:10px;"> ข้อมูลผู้ถือครอง</h2>
                    <table class="info-table">
                        <tr><td>ชื่อ-นามสกุล</td><td>${getVal(p, 'name_title')}${getVal(p, 'name')} ${getVal(p, 'surname')}</td></tr>
                        <tr><td>เลขที่แปลง</td><td>${getVal(p, 'NUM_APAR') || '-'}</td></tr>
                        <tr><td>บ้านเลขที่</td><td>${getVal(p, 'home_no') || '-'}</td></tr>
                        <tr>
                            <td>ที่ตั้งแปลง</td>
                            <td>
                                <div style="display: grid; gap: 5px;">
                                    <input type="text" id="input-village" class="edit-input" placeholder="หมู่บ้าน..." value="${village}">
                                    <div style="display: flex; gap: 5px;">
                                        ม.<input type="text" id="input-moo" class="edit-input" style="width:50px;" value="${getVal(p, 'par_moo') || ''}">
                                        ต.<input type="text" id="input-tam" class="edit-input" value="${getVal(p, 'par_tam') || ''}">
                                    </div>
                                    <div style="display: flex; gap: 5px;">
                                        อ.<input type="text" id="input-amp" class="edit-input" value="${getVal(p, 'par_amp') || ''}">
                                        จ.<input type="text" id="input-prov" class="edit-input" value="${getVal(p, 'par_prov') || ''}">
                                    </div>
                                </div>
                            </td>
                        </tr>
                        <tr><td>พื้นที่ (ไร่)</td><td style="color:blue; font-weight:bold;">${parseFloat(area).toFixed(2)} ไร่</td></tr>
                        <tr>
                            <td>พื้นที่ป่าอนุรักษ์</td>
                            <td><input type="text" id="input-forest" class="edit-input" value="${forestValue}"></td>
                        </tr>
                        <tr>
                            <td>สถานะ</td>
                            <td>
                                <select id="input-status" class="edit-input">
                                    <option value="ไม่มี" ${getVal(p, 'status') === 'ไม่มี' ? 'selected' : ''}>ไม่มี</option>
                                    <option value="อส.3" ${getVal(p, 'status') === 'อส.3' ? 'selected' : ''}>อส.3</option>
                                    <option value="อส.6" ${getVal(p, 'status') === 'อส.6' ? 'selected' : ''}>อส.6</option>
                                </select>
                            </td>
                        </tr>
                        <tr>
                            <td>การตรวจสอบ</td>
                            <td>
                                <label><input type="checkbox" id="check-review" ${p.is_reviewed ? 'checked' : ''}> สอบทาน</label>
                                <label><input type="checkbox" id="check-qualify" ${p.is_qualified ? 'checked' : ''}> ตรวจสอบคุณสมบัติ</label>
                            </td>
                        </tr>
                        <tr>
                            <td>หมายเหตุ</td>
                            <td><textarea id="input-remark" class="edit-input" style="height:60px; resize:none;" placeholder="ระบุหมายเหตุที่นี่...">${getVal(p, 'remark') || ''}</textarea></td>
                        </tr>                        <tr><td>พิกัดกลางแปลง</td><td style="color:#e91e63;">${center.lat.toFixed(6)}, ${center.lng.toFixed(6)}</td></tr>
                    </table>
                    <button class="btn-action btn-save" onclick="saveData()">💾 บันทึกข้อมูล</button>
                    <button class="btn-action btn-back" onclick="resetSidebar()">🔄 กลับหน้าหลัก</button>
                </div>
            `;
        }

        function saveData() {
            if (!window.currentSelectedLayer) return;
            const p = window.currentSelectedLayer.feature.properties;
            p.par_village = document.getElementById('input-village').value;
            p.par_moo = document.getElementById('input-moo').value;
            p.par_tam = document.getElementById('input-tam').value;
            p.par_amp = document.getElementById('input-amp').value;
            p.par_prov = document.getElementById('input-prov').value;
            p.forest_name = document.getElementById('input-forest').value;
            p.status = document.getElementById('input-status').value;
            p.is_reviewed = document.getElementById('check-review').checked;
            p.is_qualified = document.getElementById('check-qualify').checked;
            p.remark = document.getElementById('input-remark').value;

            const key = getVal(p, 'spar_code') || getVal(p, 'id');
            localStorage.setItem('map_data_' + key, JSON.stringify(p));
            alert('บันทึกข้อมูลสำเร็จ');
        }

        function executeSearch() {
            const val = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!geoLayer || !val) return;
            const detail = document.getElementById('sidebar-detail');
            document.getElementById('sidebar-default').style.display = 'none';
            detail.style.display = 'block';
            detail.innerHTML = `<h3>🔍 ผลการค้นหา: "${val}"</h3>`;
            
            let count = 0;
            geoLayer.eachLayer(layer => {
                const p = layer.feature.properties;
                // เทคนิคค้นหา: รวมค่าทุกคอลัมน์เป็น String เดียวเพื่อเช็ค
                const allDataString = Object.values(p).join(" ").toLowerCase();

                if (allDataString.includes(val)) {
                    count++;
                    const item = document.createElement('div');
                    item.className = 'name-item';
                    
                    const name = `${getVal(p, 'name_title')}${getVal(p, 'name')} ${getVal(p, 'surname')}`;
                    const village = getVal(p, 'PAR_BAN') || p.par_village || 'ไม่ระบุหมู่บ้าน';

                    // ดึงค่าป่า 2 คอลัมน์มาโชว์คู่กัน
                    const forestTH = getVal(p, 'NAME_DNP_T');
                    const forestEN = getVal(p, 'NAME_DNP');
                    let forestDisplay = "";
                    if (forestTH && forestEN) {
                        forestDisplay = `${forestTH} (${forestEN})`;
                    } else {
                        forestDisplay = forestTH || forestEN || p.forest_name || 'ไม่ระบุชื่อป่า';
                    }
                    
                    item.innerHTML = `
                        <b style="color:var(--forest-green);">${count}. ${name}</b>
                        <div style="font-size: 11px; color: #666; margin-top: 4px; line-height: 1.4;">
                               ${village} <br>
                               ${forestDisplay}
                        </div>
                    `;
                    item.onclick = () => showDetail(layer.feature, layer);
                    detail.appendChild(item);
                }
            });
            if (count === 0) detail.innerHTML += "<p style='color:red; text-align:center;'>❌ ไม่พบข้อมูลที่เกี่ยวข้อง</p>";
        }

        function resetSidebar() {
            if (window.currentSelectedLayer) {
                geoLayer.resetStyle(window.currentSelectedLayer);
                window.currentSelectedLayer = null;
            }
            map.closePopup();
            document.getElementById('sidebar-default').style.display = 'block';
            document.getElementById('sidebar-detail').style.display = 'none';
        }

        window.onload = () => changeArea('all');
    </script>
</body>
</html>
